<div class="card h-100" [class.border-success]="active()">
  <div class="card-body d-flex align-items-center justify-content-between gap-2">
    <div class="d-flex align-items-center gap-2">
      @if(active()) {
      <i class="bi bi-check-circle-fill text-success"></i>
      }
      <span class="fw-semibold">{{profile().name}}</span>
    </div>
    <div class="d-flex gap-1 flex-shrink-0">
      <button class="btn btn-sm btn-outline-success" (click)="activateRequested.emit(profile())" [disabled]="active()"
        title="Activate">
        <i class="bi bi-play-fill"></i>
      </button>
      <button class="btn btn-sm btn-outline-secondary" (click)="navigateToEditor()" title="Edit">
        <i class="bi bi-pencil"></i>
      </button>
    </div>
  </div>
</div>
