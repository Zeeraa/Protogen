<div class="container mt-4">
  <div class="row">
    <div class="col">
      <h1>Boop sensor</h1>
    </div>
  </div>

  <div class="row mt-3">
    <div class="col-12 col-md-6">
      <div class="card">
        <div class="card-header d-flex align-items-center justify-content-between">
          <div class="d-flex align-items-center gap-2">
            <i class="bi bi-hand-index"></i>
            <h5 class="mb-0">Sensor Status</h5>
          </div>
          <span class="badge" [class]="enabled ? 'bg-success' : 'bg-danger'">
            {{ enabled ? 'Enabled' : 'Disabled' }}
          </span>
        </div>
        <div class="card-body">
          <div class="form-check form-switch mb-3">
            <input class="form-check-input" type="checkbox" role="switch" id="boopSensorToggle" [checked]="enabled"
              (change)="setEnabled(!enabled)">
            <label class="form-check-label" for="boopSensorToggle">Enable sensor</label>
          </div>

          <div class="form-check form-switch mb-3">
            <input class="form-check-input" type="checkbox" role="switch" id="showBoopSensorOnHud"
              [(ngModel)]="showOnHud" (ngModelChange)="setShowOnHud($event)">
            <label class="form-check-label" for="showBoopSensorOnHud">Show on HUD</label>
          </div>

          <div class="d-flex justify-content-between align-items-center">
            <span class="text-body-secondary">Boop count</span>
            <div class="d-flex align-items-center gap-2">
              <span class="badge bg-primary">{{boopCount}}</span>
              <button class="btn btn-outline-warning btn-sm" (click)="resetCounter()">
                <i class="bi bi-arrow-counterclockwise"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row mt-3">
    <div class="col-12">
      <div class="card">
        <div class="card-header d-flex align-items-center justify-content-between">
          <div class="d-flex align-items-center gap-2">
            <i class="bi bi-person-badge"></i>
            <h5 class="mb-0">Profiles</h5>
          </div>
          <button class="btn btn-sm btn-outline-secondary" (click)="deactivate()">
            <i class="bi bi-x-circle"></i> Deactivate
          </button>
        </div>
        <div class="card-body">
          <div class="row">
            @for (profile of profiles; track $index) {
            <div class="col-sm-12 col-md-6 mt-2">
              <app-boop-sensor-profile-card [active]="profile.id == activeProfileId" [profile]="profile"
                (profileActivated)="profileActivated($event)" />
            </div>
            }
          </div>
        </div>
        <div class="card-footer">
          <button class="btn btn-primary btn-sm" (click)="openNewDialog()">
            <i class="bi bi-plus-lg"></i> New profile
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #newProfilePrompt let-modal>
  <div class="modal-header">
    <h4 class="modal-title" id="create-group-modal-title">Create profile</h4>
    <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss('Cross click')"></button>
  </div>
  <div class="modal-body">
    <form [formGroup]="newProfileForm">
      <div class="mb-2">
        <label for="newProfileName" class="form-label">Profile name</label>
        <input type="text" name="name" id="newProfileName" class="form-control" formControlName="name"
          placeholder="Profile name" maxlength="64" [class.is-invalid]="nameEmpty" [disabled]="newProfileSaving"
          aria-labelledby="newProfileNameError">

        <div id="newProfileNameError" class="invalid-feedback">
          @if(nameEmpty) {
          Name can not be empty
          }
        </div>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="modal.close('Cancel click')"
      [disabled]="newProfileSaving">Cancel</button>
    <button type="button" class="btn btn-primary" (click)="createNewProfile()" [disabled]="newProfileSaving">Create
      profile</button>
  </div>
</ng-template>
