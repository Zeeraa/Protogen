@if(!rgbEnabled) {
<div class="container mt-4">
  <div class="alert alert-warning d-flex align-items-start gap-3">
    <i class="bi bi-slash-circle fs-4 mt-1"></i>
    <div>
      <strong>RGB is disabled</strong>
      <p class="mb-0 mt-1">This feature is currently disabled. To enable it, set <code>ENABLE_RGB=true</code> in your
        <code>.env</code> file and restart the server.</p>
    </div>
  </div>
</div>
} @else {
<div class="container mt-4">
  <div class="row">
    <div class="col">
      <h1>RGB Light manager</h1>
    </div>
  </div>

  <div class="row mt-3">
    <div class="col-12">
      <div class="card">
        <div class="card-header d-flex align-items-center gap-2">
          <i class="bi bi-eye"></i>
          <h5 class="mb-0">Preview</h5>
        </div>
        <div class="card-body">
          <app-rgb-preview />
        </div>
        <div class="card-footer">
          <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-outline-secondary btn-sm" (click)="disable()">
              <i class="bi bi-x-circle"></i> Disable
            </button>
            <button class="btn btn-primary btn-sm" (click)="addBlank()">
              <i class="bi bi-plus-lg"></i> Add new effect
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row mt-3">
    <div class="col-12">
      <div class="card">
        <div class="card-header d-flex align-items-center gap-2">
          <i class="bi bi-collection"></i>
          <h5 class="mb-0">Scenes</h5>
        </div>
        <div class="card-body">
          <div class="row">
            @for (scene of scenes; track $index) {
            <div class="col-12 col-sm-6 col-md-4 col-lg-3 mt-2">
              <app-rgb-scene-card [scene]="scene" />
            </div>
            }
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
}
