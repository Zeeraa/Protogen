<div class="card">
  <div class="card-header d-flex align-items-center gap-2">
    <i class="bi bi-lightning"></i>
    <h5 class="mb-0">Quick Actions</h5>
  </div>
  <div class="card-body">
    @if (actions().length === 0) {
    <p class="text-body-secondary mb-0">No actions configured for dashboard</p>
    } @else {
    <div class="d-flex flex-wrap gap-2">
      @for (action of actions(); track action.id) {
      <button class="btn btn-outline-primary" (click)="activate.emit(action)">
        {{ action.name }}
      </button>
      }
    </div>
    }
  </div>
</div>
