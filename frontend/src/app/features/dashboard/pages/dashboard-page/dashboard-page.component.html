<div class="container mt-4">
  <div class="row">
    <div class="col">
      <h1>Dashboard</h1>
    </div>
  </div>

  <div class="masonry mt-3">
    <div class="masonry-item">
      <app-dashboard-status-card [overview]="overview()" (toggleHud)="toggleHud()" />
    </div>

    <div class="masonry-item">
      <app-dashboard-actions-card [actions]="dashboardActions()" (activate)="activateAction($event)" />
    </div>

    <div class="masonry-item">
      <app-dashboard-face-card [renderers]="renderers()" [expressions]="expressions()"
        [faceRgbEffects]="faceRgbEffects()" [activeRendererId]="activeRendererId()"
        [activeExpressionId]="activeExpressionId()" [activeFaceRgbId]="activeFaceRgbId()"
        (activateRenderer)="activateRenderer($event)" (activateExpression)="activateExpression($event)"
        (activateFaceRgb)="activateFaceRgb($event)" (disableFaceRgb)="disableFaceRgb()" />
    </div>

    <div class="masonry-item">
      <app-dashboard-rgb-card [scenes]="rgbScenes()" [activeSceneId]="activeRgbSceneId()"
        (activate)="activateRgbScene($event)" (disable)="disableRgb()" />
    </div>

    <div class="masonry-item">
      <app-dashboard-boop-card [enabled]="boopSensorEnabled()" [profiles]="boopProfiles()"
        [activeProfileId]="activeBoopProfileId()" (toggleEnabled)="toggleBoopSensor()"
        (activateProfile)="activateBoopProfile($event)" (deactivateProfile)="deactivateBoopProfile()" />
    </div>
  </div>
</div>
