<div class="container mt-4">
  <div class="row">
    <div class="col-12">
      <h1>Visor image editor</h1>
    </div>
  </div>

  @if(notFound) {
  <div class="row mt-2">
    <div class="col-12">
      <div class="alert alert-danger d-flex align-items-center gap-2" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i>
        Renderer with id {{id}} not found or of invalid type
      </div>
    </div>
  </div>
  }

  <div class="row mt-3">
    <div class="col-12 mb-3">
      <div class="card">
        <div class="card-header d-flex align-items-center gap-2">
          <i class="bi bi-eye"></i>
          <h5 class="mb-0">Visor Preview</h5>
        </div>
        <div class="card-body d-flex justify-content-center">
          <app-visor-live-preview />
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header d-flex align-items-center gap-2">
          <i class="bi bi-image"></i>
          <h5 class="mb-0">Image Settings</h5>
        </div>
        <div class="card-body">
          <p class="text-body-secondary mb-3">Make sure this renderer is active to see live preview changes.</p>
          <form [formGroup]="form">
            <div class="mb-3">
              <label for="renderer_image_name" class="form-label">Name</label>
              <input class="form-control" id="renderer_image_name" type="text" formControlName="name"
                placeholder="Scene name">
            </div>

            <div class="mb-3">
              <label for="renderer_image_file" class="form-label">Upload new file</label>
              <input class="form-control" type="file" placeholder="Select new file" (change)="onFileSelected($event)"
                #filePicker>
            </div>

            <div class="mb-3">
              <div class="form-check form-switch" title="Mirror image on visor">
                <input class="form-check-input" type="checkbox" role="switch" id="renderer_image_mirror"
                  formControlName="mirrorImage">
                <label class="form-check-label" for="renderer_image_mirror">Mirror image</label>
              </div>
            </div>

            <div class="mb-3">
              <div class="form-check form-switch" title="Flip right side of the image">
                <input class="form-check-input" type="checkbox" role="switch" id="renderer_image_rflip"
                  formControlName="flipRightSide">
                <label class="form-check-label" for="renderer_image_rflip">Flip right side</label>
              </div>
            </div>

            <div class="mb-3">
              <div class="form-check form-switch" title="Flip left side of the image">
                <input class="form-check-input" type="checkbox" role="switch" id="renderer_image_lflip"
                  formControlName="flipLeftSide">
                <label class="form-check-label" for="renderer_image_lflip">Flip left side</label>
              </div>
            </div>
          </form>
        </div>
        <div class="card-footer d-flex justify-content-between">
          <a routerLink="/visor" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back to visor
          </a>
          <div class="d-flex gap-2">
            <button type="button" class="btn btn-outline-danger btn-sm" (click)="deleteRenderer()">
              <i class="bi bi-trash"></i> Delete
            </button>
            <button type="button" class="btn btn-success btn-sm" (click)="save()">
              <i class="bi bi-check-lg"></i> Save
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #deletePrompt let-modal>
  <div class="modal-header">
    <h4 class="modal-title" id="create-group-modal-title">Confirm delete</h4>
    <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss('Cross click')"></button>
  </div>
  <div class="modal-body">
    <p>Are you sure you want to delete this renderer?</p>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="modal.close('Cancel click')">Cancel</button>
    <button type="button" class="btn btn-danger" (click)="confirmDelete()">Delete</button>
  </div>
</ng-template>
