<div class="container mt-4">
  <div class="row">
    <div class="col">
      <h1>Apps</h1>
    </div>
  </div>

  <div class="row mt-3">
    <div class="col-12">
      <div class="card">
        <div class="card-header d-flex align-items-center justify-content-between">
          <div class="d-flex align-items-center gap-2">
            <i class="bi bi-app-indicator"></i>
            <h5 class="mb-0">Active App</h5>
          </div>
          <span class="badge" [class]="activeApp ? 'bg-success' : 'bg-secondary'">
            {{ activeApp?.displayName ?? 'None' }}
          </span>
        </div>
        <div class="card-body">
          <button class="btn btn-outline-secondary btn-sm" (click)="closeActiveApp()">
            <i class="bi bi-x-circle"></i> Close active app
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="row mt-3">
    @for (app of apps; track $index) {
    <div class="col-12 col-sm-12 col-md-6 mt-2">
      <app-app-card [app]="app" [isActive]="activeApp?.name == app.name" (activated)="appActivated($event)" />
    </div>
    }
  </div>
</div>
